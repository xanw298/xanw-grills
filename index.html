<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강웅그릴스</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
      background: #1a1a1a;
    }

    .logo {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 4px;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: 18px;
      color: #aaa;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .section {
      padding: 60px 20px;
      background: #fff;
      color: #111;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h2 {
      border-left: 6px solid #ff5500;
      padding-left: 12px;
      margin-bottom: 30px;
    }

    .curriculum {
      display: grid;
      gap: 16px;
    }

    .week {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 14px;
      font-weight: 700;
      transition: 0.2s;
    }

    .week:hover {
      transform: translateY(-3px);
      background: #ffe5d9;
    }

    footer {
      text-align: center;
      padding: 30px;
      background: #111;
      font-weight: 700;
    }
  </style>
</head>

<body>

  <!-- 🔥 상단 -->
  <section class="hero">
    <div class="logo">KANGWOONG GRILLS</div>

    <div class="subtitle">
      생존은 선택이 아니라 준비다.<br>
      위기는 언제든 찾아온다.<br>
      강웅그릴스는 실제 상황에서 살아남기 위한
      지식과 전략을 공유한다.
    </div>
  </section>

  <!-- 🔥 커리큘럼 -->
  <section class="section">
    <div class="container">

      <h2>생존 커리큘럼</h2>

      <div class="curriculum">
        <div class="week">1주차 · 생존준비</div>
        <div class="week">2주차 · 자원학</div>
        <div class="week">3주차 · 거점학</div>
        <div class="week">4주차 · 에너지학</div>
        <div class="week">5주차 · 구급학</div>
        <div class="week">6주차 · 이동학</div>
      </div>

    </div>
  </section>

  <footer>
    KANGWOONG GRILLS
  </footer>

</body>
</html>
